<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CritForge{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@livekit/client-sdk-js@2/dist/livekit-client.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="logo">🎲 CritForge</a>
        <div class="nav-links">
            <a href="/campaigns/create">New Campaign</a>
            <a href="/campaigns/join">Join Campaign</a>
            <a href="/characters/import">Import Character</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>CritForge — Custom D&D Virtual Tabletop</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
